services:
  postgres:
    image: postgres:17-alpine
    container_name: article_parser_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: article_parser
    ports:
      - '5432:5432'
    volumes:
      - article_parser_postgres:/var/lib/postgresql/data

volumes:
  article_parser_postgres:
    driver: local
